<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="icon" href="site/img/avatars/logo.webp" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #222222;
      --white: #f0f0f0;
      --muted: #bbb;
      --accent: #ffffff;
      --radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      padding: 48px 16px;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 40px;
    }

    .profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      text-align: center;
    }

    .profile img {
      width: 88px; height: 88px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--border);
    }

    .profile h1 {
      font-size: 1.6rem; font-weight: 800;
      letter-spacing: -0.02em; color: var(--accent);
    }

    .profile p {
      font-size: 0.9rem; color: var(--muted);
      font-family: 'Space Mono', monospace;
      max-width: 400px; line-height: 1.6;
    }

    .divider { display: flex; align-items: center; gap: 14px; }

    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    .divider span {
      font-size: 0.7rem; font-family: 'Space Mono', monospace;
      color: var(--muted); text-transform: uppercase;
      letter-spacing: 0.12em; white-space: nowrap;
    }

    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }

    @media (min-width: 700px) {
      .grid { grid-template-columns: repeat(4, 1fr); }
      body { padding: 64px 24px; }
    }

    .tile {
      border: 1px solid var(--border); border-radius: var(--radius);
      overflow: hidden; background: var(--surface);
      display: flex; flex-direction: column;
      text-decoration: none;
      transition: border-color 0.2s, transform 0.2s;
    }

    .tile:hover { border-color: #444; transform: translateY(-2px); }
    .tile-img { padding: 14px 14px 0; }

    .tile-img img {
      width: 100%; aspect-ratio: 1/1; object-fit: cover;
      border-radius: 8px; display: block; background: var(--border);
    }

    .tile-footer { padding: 10px 14px 14px; }

    .tile-footer .label {
      font-size: 0.9rem; font-weight: 700;
      color: var(--accent); margin-bottom: 4px; font-family: 'Syne', sans-serif;
    }

    .tile-footer .sub {
      display: block; font-size: 0.78rem;
      font-family: 'Space Mono', monospace;
      color: var(--white); opacity: 0.55;
      transition: opacity 0.15s; word-break: break-all;
    }

    .tile:hover .sub { opacity: 1; }

    /* ── cards-grid: вставляется renderCards() ── */
    .cards-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }

    @media (min-width: 700px) {
      .cards-grid { grid-template-columns: repeat(2, 1fr); }
    }

    .group-card {
      border: 1px solid var(--border); border-radius: var(--radius);
      background: var(--surface); overflow: hidden;
    }

    .group-card-top { display: flex; align-items: center; gap: 16px; padding: 20px; }

    .group-card-top img {
      width: 48px; height: 48px; border-radius: 10px;
      object-fit: cover; flex-shrink: 0; border: 1px solid var(--border);
    }

    .group-card-top img.round { border-radius: 50%; }

    .group-card-info { display: flex; flex-direction: column; gap: 4px; min-width: 0; }

    .group-card-info .label {
      font-size: 1rem; font-weight: 800;
      color: var(--accent); font-family: 'Syne', sans-serif;
    }

    .card-desc {
      font-size: 0.73rem; font-family: 'Space Mono', monospace;
      color: var(--muted); opacity: 0.65; line-height: 1.5;
    }

    .group-card-links { border-top: 1px solid var(--border); display: flex; flex-direction: column; }

    .group-card-links a {
      display: flex; align-items: center; justify-content: space-between;
      padding: 11px 20px; text-decoration: none;
      border-bottom: 1px solid var(--border); transition: background 0.15s;
    }

    .group-card-links a:last-child { border-bottom: none; }
    .group-card-links a:hover { background: #1a1a1a; }

    .link-label {
      font-size: 0.88rem; font-weight: 700;
      color: var(--accent); font-family: 'Syne', sans-serif;
    }

    .arrow {
      color: var(--muted); font-size: 0.75rem;
      opacity: 0.4; transition: opacity 0.15s; flex-shrink: 0;
    }

    .group-card-links a:hover .arrow { opacity: 1; }

    /* ── progress rows ── */
    .pc-row { border-top: 1px solid var(--border); display: flex; flex-direction: column; }

    .pc-item { display: flex; flex-direction: column; border-bottom: 1px solid var(--border); }
    .pc-item:last-child { border-bottom: none; }

    a.pc-item { text-decoration: none; transition: background 0.15s; }
    a.pc-item:hover { background: #1a1a1a; }
    a.pc-item:hover .arrow { opacity: 1; }

    .pc-top {
      display: flex; align-items: center;
      justify-content: space-between; gap: 8px; padding: 11px 20px;
    }

    .pc-has-bar .pc-top { padding-bottom: 6px; }

    .pc-name {
      font-family: 'Syne', sans-serif; font-size: 0.88rem;
      font-weight: 700; color: var(--accent);
    }

    .pc-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

    .pc-meta {
      font-family: 'Space Mono', monospace; font-size: 0.68rem;
      color: var(--muted); white-space: nowrap;
    }

    .pc-badge {
      font-family: 'Space Mono', monospace; font-size: 0.65rem;
      color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase;
      border: 1px solid var(--border); padding: 2px 7px; border-radius: 4px;
    }

    .pc-track { height: 3px; background: var(--border); overflow: hidden; margin: 0 20px; }

    .pc-fill { height: 100%; background: var(--white); border-radius: 2px; }
    .pc-fill.done { background: #4dff91; }

    .pc-description {
      font-family: 'Space Mono', monospace; font-size: 0.72rem;
      color: var(--muted); opacity: 0.8; line-height: 1.6; padding: 6px 20px 4px;
    }

    .pc-comment {
      font-family: 'Space Mono', monospace; font-size: 0.68rem;
      color: var(--muted); opacity: 0.5; line-height: 1.5; padding: 4px 20px 10px;
    }
  </style>

  <!-- ═══════════════════════════════════════════════════════════
       ГЛОБАЛЬНАЯ ФУНКЦИЯ — не трогать.
       Использование в HTML:

         <div class="cards-grid" id="my-grid"></div>
         <script>
           renderCards("my-grid", [
             { title: "...", img: "...", desc: "...", items: [
               { name: "Script",  percent: 40 },
               { name: "Release", status: "SOON" },
               { name: "GitHub",  link: "https://..." },
               { description: "Любой текст без названия" },
               { name: "Note",    comment: "мелкая заметка" },
             ]}
           ]);
         </script>

       Все поля необязательны. Работают в любых комбинациях.
  ════════════════════════════════════════════════════════════ -->
  <script>
    function renderCards(targetId, cards) {
      const grid = document.getElementById(targetId);
      if (!grid) return;

      function autoStatus(item) {
        if (item.status) return item.status;
        if (item.percent >= 100) return "DONE";
        if (item.percent === 0)  return "WAITING";
        return "LOADING";
      }

      function renderItem(item) {
        const hasBar  = item.percent !== undefined && item.percent !== null;
        const hasName = !!item.name;
        const hasLink = !!item.link;

        // правая часть шапки
        let rightHtml = "";
        if (hasLink) {
          rightHtml = `<span class="arrow">↗</span>`;
        } else if (hasBar) {
          const pct    = parseFloat(item.percent).toFixed(1);
          const status = autoStatus(item);
          rightHtml = `<span class="pc-meta">${status} · ${pct}%</span>`;
        } else if (item.status) {
          rightHtml = `<span class="pc-badge">${item.status}</span>`;
        }

        // шапка
        const topHtml = (hasName || rightHtml) ? `
          <div class="pc-top">
            ${hasName ? `<span class="pc-name">${item.name}</span>` : ""}
            ${rightHtml ? `<div class="pc-right">${rightHtml}</div>` : ""}
          </div>` : "";

        // бар
        const barHtml = hasBar ? (() => {
          const pct  = parseFloat(item.percent).toFixed(1);
          const done = item.percent >= 100;
          return `<div class="pc-track"><div class="pc-fill ${done ? 'done' : ''}" style="width:${pct}%"></div></div>`;
        })() : "";

        const descHtml    = item.description ? `<div class="pc-description">${item.description}</div>` : "";
        const commentHtml = item.comment     ? `<div class="pc-comment">${item.comment}</div>`         : "";

        const cls      = "pc-item" + (hasBar ? " pc-has-bar" : "");
        const tag      = hasLink ? "a" : "div";
        const linkAttr = hasLink ? ` href="${item.link}" target="_blank"` : "";

        return `<${tag} class="${cls}"${linkAttr}>${topHtml}${barHtml}${descHtml}${commentHtml}</${tag}>`;
      }

      cards.forEach(card => {
        const imgHtml   = card.img   ? `<img src="${card.img}" alt="${card.title || ''}" />` : "";
        const titleHtml = card.title ? `<span class="label">${card.title}</span>`           : "";
        const descHtml  = card.desc  ? `<span class="card-desc">${card.desc}</span>`        : "";
        const itemsHtml = (card.items || []).map(renderItem).join("");

        const el = document.createElement("div");
        el.className = "group-card";
        el.innerHTML = `
          <div class="group-card-top">
            ${imgHtml}
            <div class="group-card-info">${titleHtml}${descHtml}</div>
          </div>
          <div class="pc-row">${itemsHtml}</div>
        `;
        grid.appendChild(el);
      });
    }
  </script>
